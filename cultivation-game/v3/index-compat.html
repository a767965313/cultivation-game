<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f3460">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>修仙合成系统 - V3.1 兼容版</title>
    <style>
        /* 基础样式整合 */
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-gold: #ffd700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        .container { max-width: 100%; margin: 0 auto; padding: 10px; }
        h1 { text-align: center; font-size: 20px; background: linear-gradient(90deg, #ffd700, #ff6b6b, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 11px; margin-bottom: 10px; }
        
        /* 按钮样式 */
        .btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 12px; font-weight: bold; color: white; cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .btn-info { background: linear-gradient(135deg, #00d2ff, #3a7bd5); }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .btn-collection { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
        .btn-challenge { background: linear-gradient(135deg, #ff416c, #ff9a44); }
        
        /* 布局 */
        .save-slot-bar { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .save-slot { flex-shrink: 0; padding: 8px 16px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; }
        .save-slot.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #667eea; }
        .slot-actions { display: flex; gap: 8px; margin-bottom: 10px; }
        .top-bar { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .top-bar .btn { flex-shrink: 0; flex: none; padding: 8px 14px; border-radius: 20px; }
        
        /* 面板 */
        .panel { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .panel-title { font-size: 12px; color: #ffd700; margin-bottom: 8px; }
        .save-info-panel { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .save-info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .save-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .save-stat-item { text-align: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .save-stat-value { font-size: 18px; font-weight: bold; color: #ffd700; }
        .save-stat-label { font-size: 10px; color: #888; margin-top: 4px; }
        
        /* 合成器 */
        .synthesizer { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .grid-8x8 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; aspect-ratio: 1; max-width: 400px; margin: 0 auto; }
        .grid-cell { aspect-ratio: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .grid-cell:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        .cell-content { width: 70%; height: 70%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; position: relative; }
        .cell-purity { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); font-size: 7px; background: rgba(0,0,0,0.8); padding: 1px 3px; border-radius: 3px; }
        .cell-level { position: absolute; top: -3px; right: -3px; width: 14px; height: 14px; background: linear-gradient(135deg, #ffd700, #ff6b6b); border-radius: 50%; font-size: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        
        /* 元素颜色 */
        .element-gold { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); }
        .element-wood { background: radial-gradient(circle at 30% 30%, #4ecdc4, #228b22); }
        .element-water { background: radial-gradient(circle at 30% 30%, #45b7d1, #1e3a8a); }
        .element-fire { background: radial-gradient(circle at 30% 30%, #ff6b6b, #c41e3a); }
        .element-earth { background: radial-gradient(circle at 30% 30%, #d4a574, #8b4513); }
        
        /* 底部 */
        .bottom-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .inventory-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .inventory-item { flex-shrink: 0; width: 50px; height: 50px; background: rgba(255,255,255,0.05); border: 2px solid transparent; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .inventory-item.selected { border-color: #ffd700; background: rgba(255,215,0,0.1); }
        .item-icon { font-size: 20px; margin-bottom: 2px; }
        .item-info { font-size: 9px; color: #888; text-align: center; }
        
        /* 修为 */
        .realm-name { font-size: 14px; font-weight: bold; text-align: center; background: linear-gradient(90deg, #f5af19, #f12711); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .realm-stage { text-align: center; font-size: 10px; color: #f5af19; margin-bottom: 5px; }
        .xp-bar-container { background: rgba(0,0,0,0.3); border-radius: 6px; height: 12px; overflow: hidden; margin-bottom: 8px; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, #f5af19, #f12711); transition: width 0.3s; }
        
        /* 统计 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 6px; border-radius: 6px; text-align: center; }
        .stat-box .label { font-size: 9px; color: #888; }
        .stat-box .value { font-size: 14px; color: #ffd700; font-weight: bold; }
        
        /* 浮动按钮 */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #ff6b6b, #feca57); border: none; color: white; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }
        
        /* 模态框 */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #667eea; border-radius: 20px; padding: 20px; width: 100%; max-width: 400px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-title { font-size: 16px; color: #ffd700; }
        .modal-close { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        
        /* Toast */
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 1px solid #ffd700; border-radius: 20px; padding: 10px 20px; color: #ffd700; font-size: 13px; z-index: 3000; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
        
        /* 错误提示 */
        .error-notice { background: rgba(255,65,108,0.2); border: 1px solid #ff416c; border-radius: 8px; padding: 10px; margin: 10px 0; text-align: center; font-size: 12px; color: #ff9a44; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 修仙合成系统 V3.1</h1>
        <p class="subtitle">兼容版 · 全浏览器支持</p>
        
        <!-- 如果JS加载失败显示的错误 -->
        <noscript>
            <div class="error-notice">
                ⚠️ 您的浏览器不支持JavaScript，请启用后使用
            </div>
        </noscript>
        
        <!-- 主内容 -->
        <div id="app-content">
            <div class="save-slot-bar" id="saveSlotBar">
                <div class="save-slot active"><span>#1</span><span>加载中...</span></div>
            </div>
            
            <div style="text-align: center; padding: 40px; color: #888;">
                <div style="font-size: 40px; margin-bottom: 20px;">⏳</div>
                <div>正在初始化游戏...</div>
                <div style="font-size: 12px; margin-top: 10px;">如长时间无响应，请刷新页面</div>
            </div>
        </div>
    </div>
    
    <!-- 使用传统script标签，兼容所有浏览器 -->
    <script>
        // 检查浏览器支持
        (function() {
            var isCompatible = true;
            var errors = [];
            
            // 检查基本功能
            if (!window.JSON) {
                errors.push('不支持 JSON');
                isCompatible = false;
            }
            if (!window.localStorage) {
                errors.push('不支持本地存储');
                isCompatible = false;
            }
            
            if (!isCompatible) {
                document.getElementById('app-content').innerHTML = 
                    '<div class="error-notice">' +
                    '<div>⚠️ 浏览器版本过低</div>' +
                    '<div style="font-size: 11px; margin-top: 5px;">' + errors.join(', ') + '</div>' +
                    '<div style="font-size: 11px; margin-top: 5px;">请使用 Chrome/Safari/Firefox 最新版</div>' +
                    '</div>';
                return;
            }
            
            // 正常加载 - 跳转到V2.1稳定版
            window.location.href = './stable.html';
        })();
    </script>
</body>
</html>
