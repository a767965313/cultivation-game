<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>修仙 · V5.0</title>
    <style>
        /* ===== 设计系统 ===== */
        :root {
            /* 四阶灰度 */
            --bg: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #e8e8e8;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border: #e0e0e0;
            --accent: #1a1a1a;
            
            /* 间距 */
            --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px;
            
            /* 圆角 */
            --r: 10px;
            
            /* 底部栏高度 */
            --bottom-bar: 72px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: var(--bottom-bar);
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* ===== 顶部境界条 ===== */
        .header {
            position: sticky;
            top: 0;
            background: var(--bg);
            padding: var(--s3) var(--s4);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        
        .realm-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--s2);
        }
        
        .realm-name {
            font-size: 15px;
            font-weight: 600;
        }
        
        .realm-xp {
            font-size: 12px;
            color: var(--text-tertiary);
        }
        
        .xp-bar {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .xp-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        
        /* ===== 主内容区 ===== */
        .main {
            padding: var(--s4);
        }
        
        /* 存档切换 */
        .slot-switcher {
            display: flex;
            gap: var(--s2);
            margin-bottom: var(--s4);
        }
        
        .slot-btn {
            flex: 1;
            padding: var(--s2) 0;
            text-align: center;
            font-size: 12px;
            border-radius: var(--r);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .slot-btn.active {
            background: var(--accent);
            color: #fff;
        }
        
        /* ===== 合成器 ===== */
        .synthesizer {
            margin-bottom: var(--s4);
        }
        
        .synth-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--s3);
        }
        
        .synth-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .synth-hint {
            font-size: 11px;
            color: var(--text-tertiary);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: var(--s2);
            aspect-ratio: 1;
            max-width: 360px;
            margin: 0 auto;
        }
        
        .cell {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            position: relative;
            transition: all 0.15s;
        }
        
        .cell:active { transform: scale(0.92); }
        .cell.selected { background: var(--bg-tertiary); box-shadow: inset 0 0 0 2px var(--accent); }
        .cell.has-item { background: var(--bg); box-shadow: inset 0 0 0 1px var(--border); }
        
        .cell-purity {
            position: absolute;
            bottom: 2px;
            font-size: 8px;
            color: var(--text-tertiary);
        }
        
        /* ===== 库存 ===== */
        .inventory-section {
            margin-bottom: var(--s4);
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: var(--s2);
        }
        
        .inventory {
            display: flex;
            gap: var(--s2);
            overflow-x: auto;
            padding: var(--s2);
            background: var(--bg-secondary);
            border-radius: var(--r);
            min-height: 64px;
            align-items: center;
        }
        
        .inv-item {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: var(--bg);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .inv-item.selected { box-shadow: 0 0 0 2px var(--accent); }
        
        .inv-item .level {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* ===== 底部固定栏 ===== */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-bar);
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            padding: var(--s2) var(--s4);
            gap: var(--s2);
            z-index: 200;
            padding-bottom: max(var(--s2), env(safe-area-inset-bottom));
        }
        
        .bottom-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-radius: var(--r);
            background: var(--bg-secondary);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .bottom-btn:active { transform: scale(0.95); }
        .bottom-btn.primary { background: var(--accent); color: #fff; }
        .bottom-btn .icon { font-size: 20px; }
        .bottom-btn .label { font-size: 11px; font-weight: 500; }
        
        /* ===== 抽屉菜单 ===== */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 300;
        }
        
        .drawer-overlay.active { opacity: 1; visibility: visible; }
        
        .drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-radius: var(--r) var(--r) 0 0;
            padding: var(--s4);
            padding-bottom: calc(var(--bottom-bar) + var(--s4));
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 301;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .drawer.active { transform: translateY(0); }
        
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--s4);
            padding-bottom: var(--s3);
            border-bottom: 1px solid var(--border);
        }
        
        .drawer-title { font-size: 16px; font-weight: 600; }
        .drawer-close { font-size: 20px; cursor: pointer; color: var(--text-secondary); }
        
        /* 菜单网格 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--s3);
        }
        
        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--s1);
            padding: var(--s3);
            background: var(--bg-secondary);
            border-radius: var(--r);
            cursor: pointer;
        }
        
        .menu-item:active { background: var(--bg-tertiary); }
        .menu-item .icon { font-size: 24px; }
        .menu-item .name { font-size: 11px; color: var(--text-secondary); }
        
        /* ===== 面板内容 ===== */
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* 统计卡片 */
        .stats-card {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--s2);
            margin-bottom: var(--s4);
        }
        
        .stat-item {
            text-align: center;
            padding: var(--s3);
            background: var(--bg-secondary);
            border-radius: var(--r);
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--text-tertiary);
        }
        
        /* 列表项 */
        .list-item {
            display: flex;
            align-items: center;
            gap: var(--s3);
            padding: var(--s3);
            background: var(--bg-secondary);
            border-radius: var(--r);
            margin-bottom: var(--s2);
        }
        
        .list-icon { font-size: 24px; width: 40px; text-align: center; }
        .list-info { flex: 1; }
        .list-name { font-size: 13px; font-weight: 500; }
        .list-desc { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
        .list-action { font-size: 12px; color: var(--text-secondary); }
        
        /* 进度条 */
        .progress-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin-top: var(--s2);
        }
        
        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        
        /* 按钮样式 */
        .btn {
            width: 100%;
            padding: var(--s3);
            border: none;
            border-radius: var(--r);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: var(--s2);
        }
        
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text); }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: var(--s3) var(--s5);
            border-radius: var(--r);
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .toast.show { opacity: 1; }
        
        /* 元素颜色 */
        .el-gold { background: linear-gradient(135deg, #ffd700, #ffaa00) !important; }
        .el-wood { background: linear-gradient(135deg, #4ecdc4, #2ecc71) !important; }
        .el-water { background: linear-gradient(135deg, #45b7d1, #3498db) !important; }
        .el-fire { background: linear-gradient(135deg, #ff6b6b, #e74c3c) !important; }
        .el-earth { background: linear-gradient(135deg, #d4a574, #a0522d) !important; }
    </style>
</head>
<body>
    <!-- 顶部境界 -->
    <header class="header">
        <div class="realm-info">
            <span class="realm-name" id="realmDisplay">炼气期 · 前期</span>
            <span class="realm-xp"><span id="currentXP">0</span> / <span id="maxXP">100</span></span>
        </div>
        <div class="xp-bar">
            <div class="xp-fill" id="xpBar" style="width: 0%"></div>
        </div>
    </header>
    
    <!-- 主内容 -->
    <main class="main">
        <!-- 存档切换 -->
        <div class="slot-switcher">
            <div class="slot-btn active" onclick="switchSlot(0)">存档 1</div>
            <div class="slot-btn" onclick="switchSlot(1)">存档 2</div>
            <div class="slot-btn" onclick="switchSlot(2)">存档 3</div>
        </div>
        
        <!-- 统计 -->
        <div class="stats-card">
            <div class="stat-item">
                <div class="stat-value" id="statCapture">0</div>
                <div class="stat-label">捕捉</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statMerge">0</div>
                <div class="stat-label">合成</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statStone">0</div>
                <div class="stat-label">灵石</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="statLevel">0</div>
                <div class="stat-label">最高</div>
            </div>
        </div>
        
        <!-- 合成器 -->
        <div class="synthesizer">
            <div class="synth-header">
                <span class="synth-title">合成器</span>
                <span class="synth-hint">点击库存 → 点击格子</span>
            </div>
            <div class="grid" id="grid"></div>
        </div>
        
        <!-- 库存 -->
        <div class="inventory-section">
            <div class="section-title">灵气库存</div>
            <div class="inventory" id="inventory">
                <span style="color: var(--text-tertiary); font-size: 12px; padding: var(--s2);">点击捕捉获取灵气</span>
            </div>
        </div>
    </main>
    
    <!-- 底部操作栏 -->
    <nav class="bottom-bar">
        <button class="bottom-btn primary" onclick="captureQi(3)">
            <span class="icon">✨</span>
            <span class="label">捕捉</span>
        </button>
        <button class="bottom-btn" onclick="autoMerge()">
            <span class="icon">⚡</span>
            <span class="label">合成</span>
        </button>
        <button class="bottom-btn" onclick="cultivate()">
            <span class="icon">🧘</span>
            <span class="label">修炼</span>
        </button>
        <button class="bottom-btn" onclick="openDrawer()">
            <span class="icon">☰</span>
            <span class="label">更多</span>
        </button>
    </nav>
    
    <!-- 抽屉菜单 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <span class="drawer-title">功能菜单</span>
            <span class="drawer-close" onclick="closeDrawer()">✕</span>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="showPanel('shop')">
                <span class="icon">🏪</span>
                <span class="name">工坊</span>
            </div>
            <div class="menu-item" onclick="showPanel('collection')">
                <span class="icon">📚</span>
                <span class="name">图鉴</span>
            </div>
            <div class="menu-item" onclick="showPanel('challenge')">
                <span class="icon">🏆</span>
                <span class="name">挑战</span>
            </div>
            <div class="menu-item" onclick="showPanel('alchemy')">
                <span class="icon">⚗️</span>
                <span class="name">炼丹</span>
            </div>
            <div class="menu-item" onclick="saveGame()">
                <span class="icon">💾</span>
                <span class="name">保存</span>
            </div>
            <div class="menu-item" onclick="exportGame()">
                <span class="icon">📤</span>
                <span class="name">导出</span>
            </div>
            <div class="menu-item" onclick="importGame()">
                <span class="icon">📥</span>
                <span class="name">导入</span>
            </div>
            <div class="menu-item" onclick="resetSlot()">
                <span class="icon">🔄</span>
                <span class="name">重置</span>
            </div>
        </div>
        
        <!-- 面板内容 -->
        <div id="panelContainer" style="margin-top: var(--s4);">
            <!-- 工坊 -->
            <div class="panel" id="panelShop">
                <div class="section-title">灵气工坊</div>
                <div id="shopList"></div>
            </div>
            
            <!-- 图鉴 -->
            <div class="panel" id="panelCollection">
                <div class="section-title">灵石图鉴</div>
                <div id="collectionGrid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--s2);"></div>
            </div>
            
            <!-- 挑战 -->
            <div class="panel" id="panelChallenge">
                <div class="section-title">挑战任务</div>
                <div id="challengeList"></div>
            </div>
            
            <!-- 炼丹 -->
            <div class="panel" id="panelAlchemy">
                <div class="section-title">炼丹房</div>
                <div id="alchemyList"></div>
            </div>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== 配置 =====
        const CONFIG = {
            GRID_SIZE: 8,
            SAVE_KEY: 'cultivation_v50_slot_',
            MAX_SLOTS: 3
        };
        
        // ===== 数据 =====
        const REALMS = [
            { name: '炼气期', stages: ['前期','中期','后期','大圆满'], xp: 100 },
            { name: '筑基期', stages: ['前期','中期','后期','大圆满'], xp: 200 },
            { name: '金丹期', stages: ['前期','中期','后期','大圆满'], xp: 400 },
            { name: '元婴期', stages: ['前期','中期','后期','大圆满'], xp: 800 },
            { name: '化神期', stages: ['前期','中期','后期','大圆满'], xp: 1600 },
            { name: '炼虚期', stages: ['前期','中期','后期','大圆满'], xp: 3200 },
            { name: '合体期', stages: ['前期','中期','后期','大圆满'], xp: 6400 },
            { name: '大乘期', stages: ['前期','中期','后期','大圆满'], xp: 12800 },
            { name: '渡劫期', stages: ['前期','中期','后期','大圆满'], xp: 25600 }
        ];
        
        const ELEMENTS = {
            gold: { name: '金', icon: '⚔️', class: 'el-gold' },
            wood: { name: '木', icon: '🌿', class: 'el-wood' },
            water: { name: '水', icon: '💧', class: 'el-water' },
            fire: { name: '火', icon: '🔥', class: 'el-fire' },
            earth: { name: '土', icon: '🏔️', class: 'el-earth' }
        };
        
        // ===== 状态 =====
        let state = {
            slot: 0,
            grid: Array(64).fill(null),
            inventory: [],
            selected: null,
            realm: 0, stage: 0, xp: 0,
            capture: 0, merge: 0, stone: 0, maxLevel: 0,
            shop: { auto: 0, boost: 0, xp: 0, luck: 0 },
            collection: {},
            challenge: {},
            pills: {}
        };
        
        // ===== 初始化 =====
        function init() {
            loadSlot(0);
            renderGrid();
            updateUI();
        }
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => onCellClick(i);
                grid.appendChild(cell);
            }
        }
        
        // ===== 核心逻辑 =====
        function captureQi(n = 3) {
            const keys = Object.keys(ELEMENTS);
            for (let i = 0; i < n; i++) {
                const el = keys[Math.floor(Math.random() * keys.length)];
                state.inventory.push({
                    id: Date.now() + i,
                    el, purity: 10, level: 0
                });
                state.capture++;
            }
            showToast(`获得 ${n} 团灵气`);
            updateUI();
        }
        
        function onCellClick(idx) {
            if (state.selected !== null) {
                // 放置
                const item = state.inventory[state.selected];
                state.grid[idx] = { ...item };
                state.inventory.splice(state.selected, 1);
                state.selected = null;
                checkMerge(idx);
            } else if (state.grid[idx]) {
                // 取回
                state.inventory.push(state.grid[idx]);
                state.grid[idx] = null;
            }
            updateUI();
        }
        
        function selectInv(idx) {
            state.selected = state.selected === idx ? null : idx;
            updateUI();
        }
        
        function checkMerge(idx) {
            // 简化合成：相邻相同元素合并
            // 完整逻辑参考 V2.1
        }
        
        function autoMerge() {
            // 自动合成逻辑
            showToast('合成功能开发中');
        }
        
        function cultivate() {
            const stones = state.inventory.filter(i => i.level > 0);
            if (stones.length === 0) {
                showToast('没有可吸收的灵石');
                return;
            }
            let gain = 0;
            stones.forEach(s => {
                gain += s.level * 10;
                state.stone++;
            });
            state.inventory = state.inventory.filter(i => i.level === 0);
            
            // 增加修为
            const realm = REALMS[state.realm];
            state.xp += gain;
            while (state.xp >= realm.xp) {
                state.xp -= realm.xp;
                state.stage++;
                if (state.stage >= 4) {
                    state.stage = 0;
                    state.realm++;
                    showToast(`突破至${REALMS[state.realm].name}！`);
                }
            }
            showToast(`修为 +${gain}`);
            updateUI();
        }
        
        // ===== UI更新 =====
        function updateUI() {
            // 境界
            const realm = REALMS[state.realm];
            document.getElementById('realmDisplay').textContent = 
                `${realm.name} · ${realm.stages[state.stage]}`;
            document.getElementById('currentXP').textContent = state.xp;
            document.getElementById('maxXP').textContent = realm.xp;
            document.getElementById('xpBar').style.width = `${(state.xp / realm.xp) * 100}%`;
            
            // 统计
            document.getElementById('statCapture').textContent = state.capture;
            document.getElementById('statMerge').textContent = state.merge;
            document.getElementById('statStone').textContent = state.stone;
            document.getElementById('statLevel').textContent = state.maxLevel;
            
            // 网格
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                const item = state.grid[i];
                cell.innerHTML = '';
                cell.className = 'cell';
                if (item) {
                    cell.classList.add('has-item', ELEMENTS[item.el].class);
                    cell.textContent = ELEMENTS[item.el].icon;
                    if (!item.level) {
                        cell.innerHTML += `<span class="cell-purity">${item.purity}%</span>`;
                    }
                }
            });
            
            // 库存
            const inv = document.getElementById('inventory');
            if (state.inventory.length === 0) {
                inv.innerHTML = '<span style="color: var(--text-tertiary); font-size: 12px; padding: var(--s2);">点击捕捉获取灵气</span>';
            } else {
                inv.innerHTML = state.inventory.map((item, i) => {
                    const el = ELEMENTS[item.el];
                    return `
                        <div class="inv-item ${state.selected === i ? 'selected' : ''} ${el.class}" 
                             onclick="selectInv(${i})">
                            ${el.icon}
                            ${item.level ? `<span class="level">${item.level}</span>` : ''}
                        </div>
                    `;
                }).join('');
            }
        }
        
        // ===== 存档 =====
        function saveGame() {
            localStorage.setItem(CONFIG.SAVE_KEY + state.slot, JSON.stringify(state));
            showToast('已保存');
        }
        
        function loadSlot(slot) {
            state.slot = slot;
            const saved = localStorage.getItem(CONFIG.SAVE_KEY + slot);
            if (saved) {
                Object.assign(state, JSON.parse(saved));
            }
            // 更新按钮状态
            document.querySelectorAll('.slot-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === slot);
            });
            updateUI();
        }
        
        function switchSlot(slot) {
            saveGame();
            loadSlot(slot);
        }
        
        function exportGame() {
            const code = btoa(JSON.stringify(state));
            prompt('复制存档码：', code);
        }
        
        function importGame() {
            const code = prompt('粘贴存档码：');
            if (code) {
                try {
                    Object.assign(state, JSON.parse(atob(code)));
                    saveGame();
                    updateUI();
                    showToast('导入成功');
                } catch {
                    showToast('存档码无效');
                }
            }
        }
        
        function resetSlot() {
            if (confirm('确定重置当前存档？')) {
                state = {
                    slot: state.slot,
                    grid: Array(64).fill(null),
                    inventory: [],
                    selected: null,
                    realm: 0, stage: 0, xp: 0,
                    capture: 0, merge: 0, stone: 0, maxLevel: 0,
                    shop: { auto: 0, boost: 0, xp: 0, luck: 0 },
                    collection: {},
                    challenge: {},
                    pills: {}
                };
                saveGame();
                updateUI();
                showToast('已重置');
            }
        }
        
        // ===== 抽屉菜单 =====
        function openDrawer() {
            document.getElementById('drawerOverlay').classList.add('active');
            document.getElementById('drawer').classList.add('active');
            hideAllPanels();
        }
        
        function closeDrawer() {
            document.getElementById('drawerOverlay').classList.remove('active');
            document.getElementById('drawer').classList.remove('active');
        }
        
        function showPanel(name) {
            hideAllPanels();
            document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
        }
        
        function hideAllPanels() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        }
        
        // ===== 工具 =====
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // ===== 启动 =====
        init();
    </script>
</body>
</html>
